name: Git Flow CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - "feature/**"
      - "release/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main
      - master
      - develop
      - "release/**"

permissions:
  contents: read

jobs:
  backend-build:
    name: Backend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/proyecto

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build backend
        run: ./mvnw -DskipTests package
